name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn lint

      - run: yarn typecheck

      - name: test + coverage
        run: yarn test --run --coverage --coverage.reporter=text-summary --coverage.reporter=lcov

      - name: coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ] || [ -f coverage/lcov-report/index.html ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            yarn --silent test --run --coverage --coverage.reporter=text-summary 2>&1 | tail -20 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage

      - run: yarn build

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --redact --verbose --no-banner --exit-code 1
